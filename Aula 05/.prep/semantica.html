<header>
  <!-- Cabeçalho da página ou de uma seção -->
  <!-- Geralmente contém: logo, título, navegação -->
</header>

<nav>
  <!-- Menu de navegação principal -->
  <!-- Contém os links entre páginas -->
</nav>

<main>
  <!-- Conteúdo principal da página -->
  <!-- Deve existir apenas 1 por página -->
</main>

<section>
  <!-- Seção temática do conteúdo -->
  <!-- Cada section deve ter um heading (h2, h3...) -->
</section>

<article>
  <!-- Conteúdo independente e reutilizável -->
  <!-- Posts de blog, cards de produto, notícias -->
</article>

<aside>
  <!-- Conteúdo lateral relacionado -->
  <!-- Sidebar, anúncios, links relacionados -->
</aside>

<footer>
  <!-- Rodapé da página ou seção -->
  <!-- Copyright, links secundários, contato -->
</footer>

<figure>
  <!-- Container semântico para mídia -->
  <!-- Imagens, gráficos, vídeos com legenda -->
</figure>

<figcaption>
  <!-- Legenda do figure -->
  <!-- Sempre dentro de um <figure> -->
</figcaption>
